version: "2"

linters:
  enable:
    - bodyclose
    - errcheck
    - goconst
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused
  settings:
    goconst:
      min-occurrences: 10
    errcheck:
      check-type-assertions: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - goconst

formatters:
  enable:
    - gofmt
